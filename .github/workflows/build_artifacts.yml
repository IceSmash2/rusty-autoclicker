name: Build artifacts
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Building for ${{ matrix.build_target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - build_target: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rusty-autoclicker-linux
          - build_target: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rusty-autoclicker-macos-x86_64
          - build_target: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rusty-autoclicker-macos-aarch64
          - build_target: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rusty-autoclicker-windows

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96" # matches Cargo.toml rust-version
          target: ${{ matrix.target }}

      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1 - faster linker
        if: matrix.os == 'ubuntu-latest'
        with:
          make-default: false

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Setup dependencies [Linux]
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # device_query
          sudo apt-get --assume-yes install libx11-dev
          # rdev
          sudo apt-get --assume-yes install libxtst-dev libevdev-dev
          # eframe
          sudo apt-get --assume-yes install libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libspeechd-dev libxkbcommon-dev libssl-dev

      - name: Build
        run: cargo build --release --verbose --target ${{ matrix.target }}

      - name: Create ./bin directory
        run: mkdir -p bin

      - name: Rename binary [Windows]
        if: matrix.os == 'windows-latest'
        run: mv target/${{ matrix.target }}/release/rusty-autoclicker.exe bin/rusty-autoclicker-windows.exe

      - name: Rename & tarball binary [Linux]
        if: matrix.build_target == 'linux'
        run: |
          mv target/${{ matrix.target }}/release/rusty-autoclicker bin/rusty-autoclicker-linux
          cd bin/
          tar -czf rusty-autoclicker-linux{.tar.gz,}
          rm rusty-autoclicker-linux

      # macOS legs publish a named per-arch tarball (released) AND keep the raw binary
      # alongside it (named plainly so it does NOT match the release glob) so the
      # macos-universal job can lipo the two arches into a single fat binary.
      - name: Rename & tarball binary [macOS]
        if: startsWith(matrix.build_target, 'macos')
        run: |
          cp target/${{ matrix.target }}/release/rusty-autoclicker bin/rusty-autoclicker
          cp target/${{ matrix.target }}/release/rusty-autoclicker bin/${{ matrix.artifact_name }}
          cd bin/
          tar -czf ${{ matrix.artifact_name }}{.tar.gz,}
          rm ${{ matrix.artifact_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/*

  macos-universal:
    name: macOS universal binary
    runs-on: macos-latest
    needs: build
    steps:
      - name: Download macOS x86_64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rusty-autoclicker-macos-x86_64
          path: x86_64
      - name: Download macOS aarch64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rusty-autoclicker-macos-aarch64
          path: aarch64
      - name: Create universal binary & tarball
        run: |
          mkdir -p bin
          lipo -create -output rusty-autoclicker-macos x86_64/rusty-autoclicker aarch64/rusty-autoclicker
          tar -czf bin/rusty-autoclicker-macos.tar.gz rusty-autoclicker-macos
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rusty-autoclicker-macos
          path: bin/rusty-autoclicker-macos*
